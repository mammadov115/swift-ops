name: mutmainnah_prod
services:
  db:
    image: postgres:16
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    env_file:
      - ../.envs/.prod/.env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.envs/.prod/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - staticfiles:/usr/src/app/staticfiles

volumes:
  postgres_data_prod:
  mediafiles:
  staticfiles: 
